services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    entrypoint: ["/app/scripts/backend-entrypoint.sh"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DB_ECHO: ${DB_ECHO:-false}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-10485760}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-4}
      LOG_TO_CONSOLE: ${LOG_TO_CONSOLE:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://tomsk-dom-za-skrepku.space}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-15}
      IMAGE_MAX_FILE_SIZE_MB: ${IMAGE_MAX_FILE_SIZE_MB:-15}
      IMAGE_MAX_DIMENSION: ${IMAGE_MAX_DIMENSION:-10000}
      IMAGE_MAIN_MAX_SIZE: ${IMAGE_MAIN_MAX_SIZE:-1920}
      IMAGE_MAIN_QUALITY: ${IMAGE_MAIN_QUALITY:-82}
      IMAGE_THUMB_MAX_SIZE: ${IMAGE_THUMB_MAX_SIZE:-640}
      IMAGE_THUMB_QUALITY: ${IMAGE_THUMB_QUALITY:-78}
      IMAGE_WEBP_METHOD: ${IMAGE_WEBP_METHOD:-4}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      ALLOW_ADMIN_TOKEN_AUTH: ${ALLOW_ADMIN_TOKEN_AUTH:-true}
      ALLOW_ADMIN_TOKEN_FALLBACK: ${ALLOW_ADMIN_TOKEN_FALLBACK:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      DEV_MODE: ${DEV_MODE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-change_me}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-change_me_bot}
      TELEGRAM_INTERNAL_API_TOKEN: ${TELEGRAM_INTERNAL_API_TOKEN:-change_me}
      BACKEND_API_URL: http://backend:8000
      BACKEND_BASE_URL: http://backend:8000
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://tomsk-dom-za-skrepku.space}
      CORS_ORIGINS: '${CORS_ORIGINS:-["https://tomsk-dom-za-skrepku.space","http://127.0.0.1:3000","http://localhost:3000"]}'
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://tomsk-dom-za-skrepku.space}
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "bot.main"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DB_ECHO: ${DB_ECHO:-false}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-10485760}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-4}
      LOG_TO_CONSOLE: ${LOG_TO_CONSOLE:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://tomsk-dom-za-skrepku.space}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-15}
      IMAGE_MAX_FILE_SIZE_MB: ${IMAGE_MAX_FILE_SIZE_MB:-15}
      IMAGE_MAX_DIMENSION: ${IMAGE_MAX_DIMENSION:-10000}
      IMAGE_MAIN_MAX_SIZE: ${IMAGE_MAIN_MAX_SIZE:-1920}
      IMAGE_MAIN_QUALITY: ${IMAGE_MAIN_QUALITY:-82}
      IMAGE_THUMB_MAX_SIZE: ${IMAGE_THUMB_MAX_SIZE:-640}
      IMAGE_THUMB_QUALITY: ${IMAGE_THUMB_QUALITY:-78}
      IMAGE_WEBP_METHOD: ${IMAGE_WEBP_METHOD:-4}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      ALLOW_ADMIN_TOKEN_AUTH: ${ALLOW_ADMIN_TOKEN_AUTH:-true}
      ALLOW_ADMIN_TOKEN_FALLBACK: ${ALLOW_ADMIN_TOKEN_FALLBACK:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      DEV_MODE: ${DEV_MODE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-change_me}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-change_me_bot}
      TELEGRAM_INTERNAL_API_TOKEN: ${TELEGRAM_INTERNAL_API_TOKEN:-change_me}
      BACKEND_API_URL: http://backend:8000
      BACKEND_BASE_URL: http://backend:8000
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://tomsk-dom-za-skrepku.space}
      CORS_ORIGINS: '${CORS_ORIGINS:-["https://tomsk-dom-za-skrepku.space","http://127.0.0.1:3000","http://localhost:3000"]}'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
