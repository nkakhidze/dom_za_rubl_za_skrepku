services:
  postgres:
    image: postgres:16
    container_name: paperclip_house_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paperclip_house
    ports:
      - "5433:5432"
    volumes:
      - paperclip_house_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  paperclip_house_postgres_data: